version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: sqlite:///storage/app.sqlite
    volumes:
      - ./config:/app/config
      - ./storage:/app/storage
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: viontin
      POSTGRES_PASSWORD: viontin
      POSTGRES_DB: viontin
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pg_data:
